<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KURODA SOPORTE</title>
    <style>
        :root {
            --bg-dark: #121212;
            --bg-card: #1e1e1e;
            --text-light: #f0f0f0;
            --accent-red: #c62828;
            --accent-red-dark: #8e0000;
            --border-white: rgba(255, 255, 255, 0.2);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-light); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Contenedor Principal con Scroll Corregido */
        .container { flex: 1; display: flex; flex-direction: column; height: 100vh; max-width: 1400px; margin: 0 auto; padding: 20px; min-height: 0; }
        
        .chat-container { 
            flex: 1; display: flex; flex-direction: column; 
            border: 1px solid var(--border-white); border-radius: 10px; 
            background-color: var(--bg-card); overflow: hidden; min-height: 0;
        }

        .chat-messages { 
            flex: 1; padding: 20px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 15px;
            scrollbar-width: thin; scrollbar-color: var(--accent-red) transparent;
        }

        /* UX DE COLUMNAS */
        .solutions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px; margin-top: 15px; width: 100%;
        }

        .solution-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--accent-red);
            padding: 20px; border-radius: 10px;
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .solution-card:hover { background: rgba(255, 255, 255, 0.08); transform: translateY(-3px); }
        .solution-card h4 { color: var(--accent-red); margin-bottom: 12px; font-size: 1rem; text-transform: uppercase; }
        .solution-card p { font-size: 0.9rem; line-height: 1.5; color: #bbb; flex: 1; margin-bottom: 15px; }

        .btn-maximize {
            background: var(--accent-red); color: white; border: none;
            padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        /* INPUT FIX */
        .chat-input-container { display: flex; padding: 15px; border-top: 1px solid var(--border-white); background: rgba(0,0,0,0.3); }
        .chat-input { flex: 1; padding: 12px 20px; border: 1px solid var(--border-white); border-radius: 25px; background: #2a2a2a; color: white; outline: none; }
        .send-button { margin-left: 10px; padding: 0 25px; background: var(--accent-red); border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; }

        /* MODAL POPUP FULLSCREEN */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; z-index: 9999;
        }
        .modal-content {
            background: var(--bg-card); width: 90%; height: 85%; padding: 40px;
            border-radius: 15px; border: 1px solid var(--accent-red); position: relative; overflow-y: auto;
        }
        .close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; color: white; cursor: pointer; }

        /* LOGIN & HISTORY (Mantenidos de tu archivo original) */
        .hidden { display: none !important; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: var(--bg-card); padding: 30px; border-radius: 10px; width: 400px; border: 1px solid var(--border-white); }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <h2 style="text-align:center; margin-bottom:20px;">KURODA SOPORTE <span>IA</span></h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Usuario" style="width:100%; padding:10px; margin-bottom:10px; background:#333; color:white; border:1px solid #444;">
                <input type="password" id="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:20px; background:#333; color:white; border:1px solid #444;">
                <button type="submit" style="width:100%; padding:12px; background:var(--accent-red); color:white; border:none; border-radius:5px; cursor:pointer;">Entrar</button>
            </form>
        </div>
    </div>

    <div id="chatScreen" class="container hidden">
        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; border-bottom:1px solid var(--border-white); padding-bottom:10px;">
            <h2>Soporte Kuroda <span>Bot</span></h2>
            <div id="userNameDisplay"></div>
        </header>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-container">
                <input type="text" id="chatInput" class="chat-input" placeholder="Consultar procesos o manuales...">
                <button id="sendBtn" class="send-button">Enviar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const N8N_WEBHOOK = 'https://n8n.happything.com.mx/webhook/6e16c5ff-eed5-44e2-ab02-76e12fb7934f/chat';
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const modal = document.getElementById('modalOverlay');

        // Lógica de Login Simple
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
        };

        async function handleSend() {
            const query = chatInput.value.trim();
            if(!query) return;

            appendMessage(query, 'user');
            chatInput.value = '';

            // Loading
            const loadId = 'loading-' + Date.now();
            const loadDiv = document.createElement('div');
            loadDiv.id = loadId;
            loadDiv.className = 'message bot-message';
            loadDiv.innerHTML = '<i>Procesando consulta...</i>';
            chatMessages.appendChild(loadDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                const response = await fetch(N8N_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatInput: query, sessionId: "kuroda-user" })
                });
                const data = await response.json();
                document.getElementById(loadId).remove();

                const botText = data.output || data.text || "No se encontró información.";
                renderSmartResponse(botText);
            } catch (err) {
                document.getElementById(loadId).innerText = "Error de conexión.";
            }
        }

        function renderSmartResponse(text) {
            const botMsgDiv = document.createElement('div');
            botMsgDiv.className = 'message bot-message';
            botMsgDiv.style.width = "100%";

            // 1. Limpiar introducción y conclusión
            // Regex para capturar Título entre ** y el contenido hasta el siguiente **
            const regex = /\*\*([^*]+)\*\*:?\s*([^*]+(?:\*[^*]+\*[^*]+)*)/g;
            let matches = [...text.matchAll(regex)];

            if (matches.length > 0) {
                // Agregar texto introductorio si existe
                const intro = text.split('**')[0].trim();
                if(intro) {
                    const p = document.createElement('p');
                    p.innerText = intro;
                    p.style.marginBottom = "15px";
                    botMsgDiv.appendChild(p);
                }

                // Crear Grid de Columnas
                const grid = document.createElement('div');
                grid.className = 'solutions-grid';

                matches.forEach(match => {
                    const title = match[1].trim();
                    const content = match[2].trim();

                    const card = document.createElement('div');
                    card.className = 'solution-card';
                    card.innerHTML = `
                        <h4>${title}</h4>
                        <p>${content.substring(0, 180)}...</p>
                        <button class="btn-maximize" onclick="maximize('${title.replace(/'/g, "\\'")}', '${content.replace(/'/g, "\\'").replace(/\n/g, "<br>")}')">Ver Manual Completo</button>
                    `;
                    grid.appendChild(card);
                });
                botMsgDiv.appendChild(grid);

                const lastMatch = matches[matches.length - 1];
                const lastIndex = text.lastIndexOf(lastMatch[0]) + lastMatch[0].length;
                const outro = text.substring(lastIndex).trim();
                if(outro && outro.length > 5) {
                    const pOutro = document.createElement('p');
                    pOutro.style.marginTop = "15px";
                    pOutro.innerText = outro;
                    botMsgDiv.appendChild(pOutro);
                }
            } else {
                botMsgDiv.innerText = text;
            }

            chatMessages.appendChild(botMsgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function maximize(title, content) {
            document.getElementById('modalBody').innerHTML = `
                <h1 style="color:var(--accent-red); margin-bottom:20px; border-bottom:1px solid #444; padding-bottom:10px;">${title}</h1>
                <div style="font-size:1.1rem; line-height:1.8; color:#eee;">${content}</div>
            `;
            modal.style.display = 'flex';
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}-message`;
            div.style.padding = "12px 20px";
            div.style.borderRadius = "15px";
            div.style.marginBottom = "10px";
            div.style.alignSelf = type === 'user' ? 'flex-end' : 'flex-start';
            div.style.backgroundColor = type === 'user' ? 'var(--accent-red-dark)' : 'rgba(255,255,255,0.05)';
            div.textContent = text;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = handleSend;
        chatInput.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
        document.getElementById('closeModal').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if(e.target == modal) modal.style.display = 'none'; };
    </script>
</body>
</html>
